name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Copy report data into build
        run: |
          if [ -f "report.json" ]; then
            echo "report.json found, will be included in build output"
          else
            echo "No report.json in repo, attempting to fetch from GitHub..."
            curl -s -f -o report.json \
              "https://raw.githubusercontent.com/voodo66-hub/gasdaily/main/report.json" \
              || echo "Warning: Could not fetch report.json, page will show 'not generated' state"
          fi

      - name: Build
        run: npm run build

      - name: Verify report in output
        run: ls -la out/report.json 2>/dev/null && echo "✅ report.json in output" || echo "⚠️  report.json missing from output"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
